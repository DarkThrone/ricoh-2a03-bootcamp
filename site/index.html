<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NES Emulator — Development Bootcamp</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎮</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f23; --panel: #16213e;
  --border: #e2e2e2; --border-dark: #4a4a4a;
  --text: #e2e2e2; --text-dim: #8b8b8b; --white: #fff;
  --red: #cc3333; --green: #33cc33; --blue: #3366cc;
  --cyan: #33cccc; --yellow: #cccc33; --orange: #cc8833; --magenta: #cc33cc;
  --pixel: 'Press Start 2P', monospace;
  --body: 'IBM Plex Mono', Menlo, Consolas, monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--body); }
body::after {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.15) 0px, rgba(0,0,0,.15) 1px, transparent 1px, transparent 3px);
}
#app { max-width: 780px; margin: 0 auto; padding: 20px; }

/* ═══ CSS Routing ═══ */
.page { display: none; scroll-margin-top: 0; }
.page:target { display: block; }

/* Default: show landing when nothing targeted */
#app:not(:has(.page:target)) > #landing { display: block; }

/* ═══ Buttons ═══ */
.nes-btn {
  display: inline-block; background: transparent; color: var(--border);
  border: 2px solid var(--border); padding: 4px 10px; font-family: var(--pixel);
  font-size: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
  line-height: 1.6; text-decoration: none; transition: transform .1s, box-shadow .1s;
  &:hover { transform: scale(1.05); box-shadow: 0 0 8px rgba(255,255,255,.15); }
}

/* ═══ Track selector buttons ═══ */
.track-btn {
  display: inline-block; padding: 10px 20px; font-family: var(--pixel);
  font-size: 10px; text-decoration: none; text-transform: uppercase;
  letter-spacing: 2px; border: 3px solid; transition: all .15s;
  &:hover { transform: scale(1.04); }
}
.track-btn--cpu { color: var(--cyan); border-color: var(--cyan); }
.track-btn--cpu:hover { background: var(--cyan); color: var(--bg); box-shadow: 0 0 20px rgba(51,204,204,.3); }
.track-btn--ppu { color: var(--green); border-color: var(--green); }
.track-btn--ppu:hover { background: var(--green); color: var(--bg); box-shadow: 0 0 20px rgba(51,204,51,.3); }
.track-btn--apu { color: var(--orange); border-color: var(--orange); }
.track-btn--apu:hover { background: var(--orange); color: var(--bg); box-shadow: 0 0 20px rgba(204,136,51,.3); }

/* ═══ Content blocks ═══ */
.block-h3 { color: var(--yellow); font-size: 11px; margin: 20px 0 10px; font-family: var(--pixel); line-height: 1.8; }
.block-p { font-size: 14px; line-height: 1.8; margin: 8px 0; }
.block-code {
  background: #0a0a1a; padding: 12px 16px; border: 2px solid var(--border-dark);
  color: var(--green); font-size: 13px; overflow-x: auto; margin: 10px 0;
  line-height: 2; white-space: pre-wrap;
}
.block-note {
  background: #0d2137; padding: 12px 16px; border: 2px solid var(--cyan);
  margin: 10px 0; font-size: 13px; color: var(--cyan); line-height: 2;
}
.block-warn {
  background: #2d1a0a; padding: 12px 16px; border: 2px solid var(--orange);
  margin: 10px 0; font-size: 13px; color: var(--orange); line-height: 2;
}
.block-list { margin: 8px 0; padding-left: 20px; list-style: none; }
.block-list li { font-size: 13px; line-height: 1.9; }
.block-list li::before { content: '► '; color: var(--text-dim); }
.block-table { overflow-x: auto; margin: 10px 0; }
.block-table table { width: 100%; border-collapse: collapse; font-size: 12px; }
.block-table th {
  border: 1px solid var(--border-dark); padding: 8px 10px; text-align: left;
  background: #1a1a3e; color: var(--yellow); line-height: 1.8;
}
.block-table td { border: 1px solid var(--border-dark); padding: 6px 10px; line-height: 1.8; }
.block-table tr:nth-child(even) td { background: #0a0a1a; }
.block-table td:first-child { color: var(--cyan); }

.resource-link {
  display: block; color: var(--cyan); font-size: 12px;
  margin-bottom: 8px; text-decoration: none; line-height: 2; transition: color .15s;
  &:hover { color: var(--white); }
  & .dim { color: var(--text-dim); }
}
.phase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
.week-card {
  --c: var(--card-color, var(--cyan));
  display: block; background: var(--panel); padding: 12px 14px;
  text-align: left; text-decoration: none; color: inherit;
  border: 2px solid color-mix(in srgb, var(--c) 40%, transparent);
  transition: border-color .15s, box-shadow .15s;
  &:hover { border-color: var(--c); box-shadow: 0 0 12px color-mix(in srgb, var(--c) 20%, transparent); }
  & .wk-num { font-size: 8px; color: var(--text-dim); margin-bottom: 4px; }
  & .wk-title { font-size: 11px; color: var(--text); line-height: 1.8; }
}
.week-header {
  --c: var(--card-color, var(--cyan));
  background: #0a0a1a; border: 3px solid var(--c); padding: 24px; margin-bottom: 20px;
  & .phase-label { font-size: 9px; font-family: var(--pixel); color: var(--c); margin-bottom: 10px; letter-spacing: 2px; }
  & h2 { font-family: var(--pixel); font-size: 14px; color: var(--white); margin: 0; line-height: 1.8; }
}
.resources-box {
  background: #0a0a1a; border: 2px solid var(--blue); padding: 16px; margin-top: 16px;
  & h3 { font-family: var(--pixel); font-size: 10px; color: var(--blue); margin: 0 0 12px; }
}
.hero {
  text-align: center; padding: 30px 16px; margin-bottom: 24px;
  background: linear-gradient(180deg, #1a1a3e, #0f0f23);
  border: 3px solid var(--red); position: relative; overflow: hidden;
  &::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(204,51,51,.08), transparent 70%); }
  & > * { position: relative; }
  & .subtitle { font-family: var(--pixel); font-size: 9px; color: var(--red); letter-spacing: 4px; margin-bottom: 12px; }
  & h1 { font-family: var(--pixel); font-size: 18px; color: var(--white); margin: 0 0 8px; line-height: 1.8; text-shadow: 2px 2px 0 #cc333344; }
  & .tagline { font-family: var(--pixel); font-size: 11px; color: var(--yellow); line-height: 1.8; }
  & .meta { font-size: 10px; color: var(--text-dim); margin-top: 14px; line-height: 2; }
}
.summary {
  background: var(--panel); border: 3px solid var(--border-dark);
  padding: 16px 20px; margin-bottom: 24px; font-size: 13px; line-height: 1.8;
}
.phase-heading {
  font-family: var(--pixel); font-size: 10px; letter-spacing: 1px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  &::before { content: ''; display: inline-block; width: 8px; height: 8px; background: currentColor; flex-shrink: 0; }
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.blink { animation: blink 1.06s step-end infinite; }
</style>
</head>
<body>
<div id="app">
  <section id="landing" class="page"></section>
</div>

/* ─── Helpers ─── */
const e = s => { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; };
const cv = c => `var(--${c})`;

function block(b) {
  switch (b.y) {
    case "h3":   return `<h3 class="block-h3">${e(b.x)}</h3>`;
    case "p":    return `<p class="block-p">${e(b.x)}</p>`;
    case "code": return `<pre class="block-code">${e(b.x)}</pre>`;
    case "note": return `<div class="block-note">ℹ ${e(b.x)}</div>`;
    case "warn": return `<div class="block-warn">⚠ ${e(b.x)}</div>`;
    case "list": return `<ul class="block-list">${b.x.map(i=>`<li>${e(i)}</li>`).join("")}</ul>`;
    case "table": return `<div class="block-table"><table><thead><tr>${b.h.map(h=>`<th>${e(h)}</th>`).join("")}</tr></thead><tbody>${b.r.map(r=>`<tr>${r.map(c=>`<td>${e(c)}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
  }
  return "";
}

function links(arr) {
  if (!arr?.length) return "";
  return `<div class="resources-box"><h3>RESOURCES</h3>${arr.map(([l,u])=>`<a class="resource-link" href="${u}" target="_blank" rel="noopener noreferrer"><span class="dim">&gt; </span>${e(l)} <span style="color:var(--text-dim);font-size:8px">↗</span></a>`).join("")}</div>`;
}

    <h1>NES EMULATOR</h1>

    <a href="#ppu-home" class="track-btn track-btn--ppu">► PPU — 14 weeks</a>

/* ─── Stamp each track ─── */
const app = document.getElementById("app");

for (const [key, T] of Object.entries(TRACKS)) {
  // Track home page
  const home = document.createElement("section");
  home.id = `${key}-home`;
  home.className = "page";
  const phasesHTML = T.phases.map((ph, i) => {
    const cards = ph.weeks.map(n => {
      const w = T.weeks[n];
      return `<a href="#${key}-w${n}" class="week-card" style="--card-color:${cv(ph.color)}">
        <div class="wk-num">WEEK ${n}</div>
        <div class="wk-title">${e(w.t)}</div>
      </a>`;
    }).join("");
    return `<div style="margin-bottom:20px">
      <div class="phase-heading" style="color:${cv(ph.color)}">PHASE ${i+1}: ${ph.name}</div>
      <div class="phase-grid">${cards}</div>
    </div>`;
  }).join("");

  home.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:20px">
      <a href="#" class="nes-btn">← Tracks</a>
    </div>
    <div class="hero" style="border-color:${cv(T.color)}">
      <div class="subtitle" style="color:${cv(T.color)}">${T.chip}</div>
      <h1>${T.label}</h1>
      <div class="tagline">${T.subtitle}</div>
      <div class="meta">${T.duration.toUpperCase()} · 1 HOUR/WEEK</div>
    </div>
    <div class="summary">

      <span style="color:var(--yellow)">★ KEY MILESTONE:</span>
      <span style="color:var(--orange)">${e(T.milestone.text)}</span>
    </div>
    ${phasesHTML}
    <div class="resources-box" style="margin-top:8px"><h3>KEY REFERENCES</h3>
      ${T.refs.map(([l,u])=>`<a class="resource-link" href="${u}" target="_blank" rel="noopener noreferrer"><span class="dim">&gt; </span>${e(l)}</a>`).join("")}
    </div>`;
  app.appendChild(home);

  // Week pages
  const weekNums = Object.keys(T.weeks).map(Number).sort((a,b) => a-b);
  for (const n of weekNums) {
    const w = T.weeks[n];
    const ph = T.phases[w.ph];
    const c = cv(ph.color);
    const idx = weekNums.indexOf(n);
    const prev = idx > 0 ? weekNums[idx-1] : null;
    const next = idx < weekNums.length-1 ? weekNums[idx+1] : null;

    const sec = document.createElement("section");
    sec.id = `${key}-w${n}`;
    sec.className = "page";
    sec.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:20px">
        <a href="#${key}-home" class="nes-btn">← ${T.label}</a>
        <div style="display:flex;gap:8px">
          ${prev !== null ? `<a href="#${key}-w${prev}" class="nes-btn">◄ W${prev}</a>` : ""}
          ${next !== null ? `<a href="#${key}-w${next}" class="nes-btn">W${next} ►</a>` : ""}
        </div>
      </div>
      <div class="week-header" style="--card-color:${c}">
        <div class="phase-label">PHASE ${w.ph+1}: ${ph.name}</div>
        <h2>WEEK ${n}: ${e(w.t)}</h2>

      <div style="background:var(--panel);border:3px solid var(--border-dark);padding:20px">
        ${w.c.map(block).join("")}
      </div>
      ${links(w.l)}`;
    app.appendChild(sec);
  }
}
